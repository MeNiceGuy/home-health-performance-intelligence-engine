<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
</head>
<body>
    <h1>DASHBOARD LIVE</h1>

    <h2>{{ agency_name }}</h2>
    <p>{{ city }}, {{ state }}</p>

    <hr>

    <h3>Score: {{ total_score }}/100</h3>
    <p>Tier: {{ tier }}</p>

    <hr>

    <h3>Performance</h3>
    <ul>
        <li>Star Rating: {{ star_rating }}</li>
        <li>Readmission Rate: {{ readmission_rate }}%</li>
        <li>Patient Satisfaction: {{ patient_satisfaction }}%</li>
    </ul>

</body>
</html>
